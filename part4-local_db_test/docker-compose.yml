services:
  db:
    image: postgres:16
    container_name: tripare-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appadmin
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appadmin -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: