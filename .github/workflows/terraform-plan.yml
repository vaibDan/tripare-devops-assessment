name: Terraform Plan

permissions:
    contents: read
    pull-requests: write 

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "part1-tf_infra_design/**"
      - "part2-tf_env_handling/**"
      - ".github/workflows/terraform-plan.yml"

concurrency:
  group: terraform-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  terraform:
    name: fmt / init / validate / plan (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, prod]

    defaults:
      run:
        working-directory: part2-tf_env_handling/envs/${{ matrix.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: true # lets us capture stdout/exitcode below

      # Checked across the whole repo, not just this environment's folder,
      # so a formatting issue in a shared module still fails the check.
      - name: Terraform fmt (check only, doesn't modify files)
        id: fmt
        run: terraform fmt -check -recursive -diff ../../../
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init 

      - name: Terraform validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false -refresh=false -var-file=${{ matrix.environment }}.tfvars
        continue-on-error: true
        env:
          # Assignment explicitly states actual AWS deployment is not
          # required — dummy credentials let plan run against fictitious
          # resources without needing a real AWS account in CI.
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: always()
        env:
          FMT_OUTCOME: ${{ steps.fmt.outcome }}
          INIT_OUTCOME: ${{ steps.init.outcome }}
          VALIDATE_OUTCOME: ${{ steps.validate.outcome }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_STDERR: ${{ steps.plan.outputs.stderr }}
          ENVIRONMENT: ${{ matrix.environment }}
        with:
          script: |
            const output = `#### Terraform Plan — \`${process.env.ENVIRONMENT}\`

            | Step | Result |
            |---|---|
            | fmt | \`${process.env.FMT_OUTCOME}\` |
            | init | \`${process.env.INIT_OUTCOME}\` |
            | validate | \`${process.env.VALIDATE_OUTCOME}\` |
            | plan | \`${process.env.PLAN_OUTCOME}\` |

            <details><summary>Show plan output</summary>

            \`\`\`
            ${process.env.PLAN_STDOUT || process.env.PLAN_STDERR || 'No plan output captured.'}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }} | Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail job if any step failed
        if: steps.fmt.outcome == 'failure' || steps.validate.outcome == 'failure' || steps.plan.outcome == 'failure'
        run: exit 1
